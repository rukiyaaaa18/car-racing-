<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Racing Game</title>
</head>

<body style="margin:0;background:#222;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="text-align:center;">

<h1 style="color:white;">🚗 Car Racing Game</h1>

<h2 style="color:white;">Score :
<span id="score">0</span>
</h2>

<div id="road"
style="
width:350px;
height:600px;
background:#555;
border:5px solid white;
position:relative;
overflow:hidden;
">

<!-- Road Lines -->
<div style="position:absolute;left:170px;width:10px;height:100%;background:repeating-linear-gradient(white 0px,white 40px,transparent 40px,transparent 80px);"></div>

<!-- Player -->
<div id="player"
style="
position:absolute;
bottom:20px;
left:150px;
width:50px;
height:90px;
background:dodgerblue;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:white;
">
🚗
</div>

<!-- Enemy -->
<div id="enemy"
style="
position:absolute;
top:-100px;
left:150px;
width:50px;
height:90px;
background:red;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:white;
">
🚙
</div>

</div>

<br>

<button id="start"
style="
padding:12px 30px;
font-size:20px;
cursor:pointer;
border:none;
background:green;
color:white;
border-radius:8px;
">
Start Game
</button>

</div>

<script>

const player=document.getElementById("player");
const enemy=document.getElementById("enemy");
const scoreText=document.getElementById("score");
const start=document.getElementById("start");

let playerX=150;
let enemyX=150;
let enemyY=-100;

let score=0;
let playing=false;

document.addEventListener("keydown",function(e){

if(!playing) return;

if(e.key==="ArrowLeft" && playerX>0){
playerX-=25;
}

if(e.key==="ArrowRight" && playerX<300){
playerX+=25;
}

player.style.left=playerX+"px";

});

function loop(){

if(!playing) return;

enemyY+=7;

enemy.style.top=enemyY+"px";
enemy.style.left=enemyX+"px";

if(enemyY>650){

enemyY=-100;

let lanes=[25,100,175,250];

enemyX=lanes[Math.floor(Math.random()*lanes.length)];

score++;

scoreText.innerHTML=score;

}

if(enemyY>450 && enemyY<560){

if(Math.abs(playerX-enemyX)<45){

playing=false;

alert("Game Over!\n\nYour Score : "+score);

start.style.display="inline-block";

return;

}

}

requestAnimationFrame(loop);

}

start.onclick=function(){

score=0;
scoreText.innerHTML=0;

playerX=150;
enemyY=-100;

enemyX=[25,100,175,250][Math.floor(Math.random()*4)];

player.style.left=playerX+"px";

playing=true;

start.style.display="none";

loop();

};

</script>

</body>
</html>
